<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nellore Spice</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a0a02;
      font-family: 'Segoe UI', sans-serif;
    }

    .scene {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(180deg, #0d0401 0%, #1a0a02 40%, #2d1005 70%, #3d1a08 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* ── Floating embers ── */
    .ember {
      position: absolute;
      border-radius: 50%;
      animation: float-ember linear infinite;
      opacity: 0;
    }
    @keyframes float-ember {
      0%   { transform: translateY(100vh) translateX(0) scale(1); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: .6; }
      100% { transform: translateY(-10vh) translateX(40px) scale(0.3); opacity: 0; }
    }

    /* ── Background glow ── */
    .bg-glow {
      position: absolute;
      bottom: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(249,115,22,.18) 0%, transparent 70%);
      animation: glow-pulse 3s ease-in-out infinite;
    }
    @keyframes glow-pulse { 0%,100%{opacity:.5;transform:translateX(-50%) scale(1)} 50%{opacity:1;transform:translateX(-50%) scale(1.15)} }

    /* ── Title ── */
    .title-wrap {
      text-align: center;
      margin-bottom: 28px;
      animation: fade-in 1.2s ease-out both;
      z-index: 2;
    }
    .brand-name {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      color: #f5d06b;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow: 0 0 40px rgba(245,208,107,.4);
      animation: title-glow 2.5s ease-in-out infinite;
    }
    @keyframes title-glow { 0%,100%{text-shadow:0 0 20px rgba(245,208,107,.3)} 50%{text-shadow:0 0 60px rgba(245,208,107,.7), 0 0 100px rgba(249,115,22,.3)} }
    .brand-sub {
      font-size: clamp(11px, 1.5vw, 15px);
      color: #e8956a;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-top: 6px;
      animation: fade-in 1.8s ease-out both;
    }
    @keyframes fade-in { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    /* ── Cooking stage ── */
    .cooking-stage {
      position: relative;
      width: 340px;
      height: 300px;
      z-index: 2;
    }

    /* Stove */
    .stove-base {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 260px;
      height: 32px;
      background: linear-gradient(180deg, #1c0e04, #110804);
      border-radius: 8px 8px 4px 4px;
      border: 1.5px solid #3a1e0a;
    }
    .burner-ring {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 16px;
      background: #0d0604;
      border-radius: 50%;
      border: 2px solid #2a1206;
    }

    /* Flames */
    .flame-group {
      position: absolute;
      bottom: 42px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      align-items: flex-end;
    }
    .flame {
      border-radius: 50% 50% 30% 30%;
      transform-origin: bottom center;
    }
    .f1 { width:16px; height:32px; background:linear-gradient(180deg,#fff9c4,#f97316,#dc2626); animation:flame1 .65s ease-in-out infinite; }
    .f2 { width:14px; height:22px; background:linear-gradient(180deg,#fde68a,#fb923c,#b91c1c); animation:flame2 .5s ease-in-out infinite .1s; }
    .f3 { width:18px; height:28px; background:linear-gradient(180deg,#fef9c3,#f97316,#dc2626); animation:flame1 .75s ease-in-out infinite .2s; }
    .f4 { width:14px; height:20px; background:linear-gradient(180deg,#fde68a,#fb923c,#b91c1c); animation:flame2 .55s ease-in-out infinite .3s; }
    .f5 { width:16px; height:26px; background:linear-gradient(180deg,#fff9c4,#f97316,#dc2626); animation:flame1 .7s ease-in-out infinite .15s; }
    .f6 { width:12px; height:18px; background:linear-gradient(180deg,#fde68a,#fb923c,#b91c1c); animation:flame2 .6s ease-in-out infinite .25s; }
    @keyframes flame1 { 0%,100%{height:28px;opacity:.9;transform:scaleX(1)} 50%{height:40px;opacity:1;transform:scaleX(.9)} }
    @keyframes flame2 { 0%,100%{height:18px;opacity:.7;transform:scaleX(1)} 50%{height:28px;opacity:.95;transform:scaleX(1.1)} }

    /* Handi pot */
    .handi-wrap {
      position: absolute;
      bottom: 54px;
      left: 50%;
      transform: translateX(-50%);
    }
    .handi-rim {
      width: 196px;
      height: 12px;
      background: linear-gradient(180deg, #b07040, #6a3a18);
      border-radius: 5px;
      margin: 0 auto;
    }
    .handi-top {
      width: 184px;
      height: 24px;
      background: linear-gradient(180deg, #8a4a22, #4e2610);
      border-radius: 6px 6px 0 0;
      margin: -2px auto 0;
      border: 1.5px solid #aa6030;
    }
    .handi-body {
      width: 170px;
      height: 110px;
      background: linear-gradient(160deg, #6b3a1f, #3d1f0b, #2a1408);
      border-radius: 0 0 55% 55% / 0 0 65% 65%;
      border: 2px solid #8b4a20;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }
    .rice-fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 50px;
      background: linear-gradient(180deg, #f5d06b, #e8b84a, #d49a30);
      border-radius: 0 0 55% 55% / 0 0 60% 60%;
      animation: rice-bubble 2s ease-in-out infinite;
    }
    @keyframes rice-bubble { 0%,100%{height:50px} 50%{height:56px} }
    .spice-stripe {
      position: absolute;
      bottom: 44px; left: 8px; right: 8px;
      height: 10px;
      background: linear-gradient(90deg, #dc2626, #ea580c, #f59e0b, #ea580c, #dc2626);
      opacity: .85;
      border-radius: 3px;
      animation: spice-shimmer 1.5s ease-in-out infinite;
    }
    @keyframes spice-shimmer { 0%,100%{opacity:.7} 50%{opacity:1} }
    .meat-chunks {
      position: absolute;
      bottom: 52px;
      display: flex;
      gap: 10px;
      left: 20px;
    }
    .chunk {
      width: 14px;
      height: 10px;
      background: #7a2e0e;
      border-radius: 3px;
      border: 1px solid #9a3e18;
      animation: chunk-bob 2s ease-in-out infinite;
    }
    .chunk:nth-child(2) { animation-delay: .4s; background: #6b2808; }
    .chunk:nth-child(3) { animation-delay: .8s; }
    @keyframes chunk-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

    /* Steam */
    .steam-group {
      position: absolute;
      bottom: 168px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
    }
    .steam {
      position: absolute;
      bottom: 0;
      border-radius: 50%;
      background: rgba(255,255,255,.25);
      animation: rise-steam ease-out infinite;
    }
    .st1 { width:10px; height:32px; left:10px; border-radius:5px; animation-duration:2.2s; animation-delay:0s; }
    .st2 { width:12px; height:40px; left:32px; border-radius:6px; animation-duration:2.8s; animation-delay:.5s; }
    .st3 { width:8px;  height:28px; left:54px; border-radius:4px; animation-duration:2s;   animation-delay:1s; }
    .st4 { width:11px; height:36px; left:76px; border-radius:5px; animation-duration:2.5s; animation-delay:1.5s; }
    .st5 { width:9px;  height:30px; left:96px; border-radius:4px; animation-duration:2.3s; animation-delay:.8s; }
    @keyframes rise-steam {
      0%   { transform:translateY(0) scaleX(1); opacity:.7; }
      50%  { transform:translateY(-30px) scaleX(1.4); opacity:.4; }
      100% { transform:translateY(-70px) scaleX(1.8); opacity:0; }
    }

    /* Spoon */
    .spoon-wrap {
      position: absolute;
      left: 22px;
      bottom: 100px;
      transform-origin: bottom center;
      animation: stir 2s ease-in-out infinite;
    }
    @keyframes stir { 0%,100%{transform:rotate(-20deg)} 50%{transform:rotate(20deg) translateX(8px)} }
    .spoon-handle { width:5px; height:72px; background:linear-gradient(180deg,#c8922a,#7a4e18); border-radius:3px; }
    .spoon-bowl   { width:22px; height:14px; background:#c8882a; border-radius:50%; margin-left:-9px; margin-top:-4px; border:1px solid #e8a840; }

    /* Ladle */
    .ladle-wrap {
      position: absolute;
      right: 18px;
      top: 38px;
      transform-origin: top right;
      animation: ladle-tilt 3s ease-in-out infinite;
    }
    @keyframes ladle-tilt { 0%,55%,100%{transform:rotate(0deg)} 70%,85%{transform:rotate(-28deg)} }
    .ladle-handle { width:5px; height:80px; background:linear-gradient(180deg,#b07030,#6a4020); border-radius:3px; transform:rotate(35deg); }
    .ladle-bowl   { width:30px; height:20px; background:linear-gradient(180deg,#8a5820,#5a3810); border-radius:50%; margin-left:-12px; margin-top:-4px; border:1px solid #aa7830; }
    .gravy-drop {
      position: absolute;
      width: 5px; height: 7px;
      background: #ea580c;
      border-radius: 50% 50% 60% 60%;
      right: 28px; top: 80px;
      animation: drip 3s ease-in infinite;
    }
    @keyframes drip { 0%,65%{opacity:0;transform:translateY(-4px)} 75%,90%{opacity:1;transform:translateY(8px)} 100%{opacity:0;transform:translateY(18px)} }

    /* Flying spices */
    .spice-dot {
      position: absolute;
      border-radius: 50%;
      animation: spice-fall ease-in infinite;
    }
    @keyframes spice-fall {
      0%  { opacity:0; transform:translateY(-20px) rotate(0deg); }
      20% { opacity:1; }
      100%{ opacity:0; transform:translateY(50px) rotate(180deg); }
    }

    /* Herb leaf */
    .herb {
      position: absolute;
      width: 14px; height: 8px;
      background: #16a34a;
      border-radius: 50%;
      animation: herb-fall ease-in infinite;
    }
    @keyframes herb-fall {
      0%  { opacity:0; transform:translateY(-30px) rotate(-20deg); }
      30% { opacity:.9; }
      100%{ opacity:0; transform:translateY(60px) rotate(40deg); }
    }

    /* Ingredients row */
    .ingredients {
      display: flex;
      gap: 20px;
      margin-top: 22px;
      z-index: 2;
      animation: fade-in 2s ease-out both;
    }
    .ingr-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .ingr-circle {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      border: 1.5px solid rgba(255,255,255,.15);
      animation: ingr-pulse 2.5s ease-in-out infinite;
    }
    @keyframes ingr-pulse { 0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(245,208,107,0)} 50%{transform:scale(1.08);box-shadow:0 0 12px 4px rgba(245,208,107,.15)} }
    .ingr-label {
      font-size: 9px;
      color: #c97a2a;
      letter-spacing: .5px;
      text-align: center;
      line-height: 1.3;
    }

    /* Tagline */
    .tagline {
  position: absolute;
  bottom: 20px;          /* adjust if needed */
  left: 50%;
  transform: translateX(-50%);

  font-size: clamp(10px, 1.5vw, 13px);
  color: #c97a2a;
  letter-spacing: 3px;
  text-transform: uppercase;
  animation: glow-pulse 3s ease-in-out infinite;
  z-index: 2;

  white-space: nowrap;   /* prevents weird wrapping shift */
  text-align: center;
}

    /* Divider line */
    .divider {
      width: 120px; height: 1px;
      background: linear-gradient(90deg, transparent, #c97a2a, transparent);
      margin: 10px auto;
      animation: fade-in 2.5s ease-out both;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="scene">

    <!-- Background glow -->
    <div class="bg-glow"></div>

    <!-- Floating embers (JS generated) -->

    <!-- Title -->
    <div class="title-wrap">
      <div class="brand-name">Nellore Spice</div>
      <div class="divider"></div>
      <div class="brand-sub">Authentic Andhra Biryani</div>
    </div>

    <!-- Cooking stage -->
    <div class="cooking-stage">

      <!-- Steam -->
      <div class="steam-group">
        <div class="steam st1"></div>
        <div class="steam st2"></div>
        <div class="steam st3"></div>
        <div class="steam st4"></div>
        <div class="steam st5"></div>
      </div>

      <!-- Spice particles -->
      <div class="spice-dot" style="width:6px;height:6px;background:#dc2626;left:70px;top:90px;animation-duration:2.1s;animation-delay:0s;"></div>
      <div class="spice-dot" style="width:5px;height:5px;background:#f97316;left:105px;top:70px;animation-duration:1.8s;animation-delay:.6s;"></div>
      <div class="spice-dot" style="width:7px;height:7px;background:#eab308;left:145px;top:100px;animation-duration:2.4s;animation-delay:1.2s;"></div>
      <div class="spice-dot" style="width:5px;height:5px;background:#dc2626;left:185px;top:80px;animation-duration:2s;animation-delay:1.8s;"></div>
      <div class="spice-dot" style="width:6px;height:6px;background:#fb923c;left:225px;top:95px;animation-duration:1.9s;animation-delay:.3s;"></div>
      <div class="spice-dot" style="width:4px;height:4px;background:#f59e0b;left:88px;top:115px;animation-duration:2.2s;animation-delay:.9s;"></div>

      <!-- Herb leaves -->
      <div class="herb" style="left:120px;top:75px;animation-duration:3s;animation-delay:.4s;"></div>
      <div class="herb" style="left:200px;top:65px;animation-duration:2.7s;animation-delay:1.4s;background:#15803d;"></div>

      <!-- Spoon -->
      <div class="spoon-wrap">
        <div class="spoon-handle"></div>
        <div class="spoon-bowl"></div>
      </div>

      <!-- Ladle -->
      <div class="ladle-wrap">
        <div class="ladle-handle"></div>
        <div class="ladle-bowl"></div>
      </div>
      <div class="gravy-drop"></div>

      <!-- Handi pot -->
      <div class="handi-wrap">
        <div class="handi-rim"></div>
        <div class="handi-top"></div>
        <div class="handi-body">
          <div class="spice-stripe"></div>
          <div class="meat-chunks">
            <div class="chunk"></div>
            <div class="chunk"></div>
            <div class="chunk"></div>
          </div>
          <div class="rice-fill"></div>
        </div>
      </div>

      <!-- Burner & stove -->
      <div class="burner-ring"></div>
      <div class="flame-group">
        <div class="flame f1"></div>
        <div class="flame f2"></div>
        <div class="flame f3"></div>
        <div class="flame f4"></div>
        <div class="flame f5"></div>
        <div class="flame f6"></div>
      </div>
      <div class="stove-base"></div>

    </div>

    <!-- Ingredients -->
    <div class="ingredients">
      <div class="ingr-item">
        <div class="ingr-circle" style="background:rgba(220,38,38,.2);animation-delay:0s;">🌶️</div>
        <div class="ingr-label">Nellore<br>Chilli</div>
      </div>
      <div class="ingr-item">
        <div class="ingr-circle" style="background:rgba(234,179,8,.2);animation-delay:.3s;">🍚</div>
        <div class="ingr-label">Basmati<br>Rice</div>
      </div>
      <div class="ingr-item">
        <div class="ingr-circle" style="background:rgba(249,115,22,.2);animation-delay:.6s;">🥩</div>
        <div class="ingr-label">Tender<br>Meat</div>
      </div>
      <div class="ingr-item">
        <div class="ingr-circle" style="background:rgba(34,197,94,.2);animation-delay:.9s;">🌿</div>
        <div class="ingr-label">Fresh<br>Herbs</div>
      </div>
      <div class="ingr-item">
        <div class="ingr-circle" style="background:rgba(201,122,42,.2);animation-delay:1.2s;">🧅</div>
        <div class="ingr-label">Crispy<br>Onions</div>
      </div>
    </div>

    <!-- Tagline -->
    <div class="tagline">🔥 Crafted with Andhra Fire  🔥</div>

  </div>

  <script>
    // Generate floating embers
    const scene = document.querySelector('.scene');
    for (let i = 0; i < 18; i++) {
      const e = document.createElement('div');
      e.className = 'ember';
      const size = Math.random() * 4 + 2;
      const colors = ['#f97316','#dc2626','#fbbf24','#fb923c','#ef4444'];
      e.style.cssText = `
        width:${size}px; height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        left:${Math.random()*100}%;
        animation-duration:${3 + Math.random()*4}s;
        animation-delay:${Math.random()*4}s;
      `;
      scene.appendChild(e);
    }
  </script>
</body>
</html>
